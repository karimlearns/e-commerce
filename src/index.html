<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر عربي</title>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <nav class="navbar custom-navbar">
                <div class="container px-0">
                    <div class="navbar-header">
                        <a href="">
                            <img src="./images/logo.png" alt="متجر عربي">
                        </a>
                    </div>
                    <form action="" class="d-flex">
                        <input type="search" class="form-control custom-form-control" placeholder="البحث">
                        <div class="dropdown">
                            <a href="#" class="nav-link dropdown-toggle custom-btn categories" id="navbar-dropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">إختر فئة</a>
                            <ul class="dropdown-menu custom-dropdown-menu">
                                <li>
                                    <div class="checkbox ms-2">
                                        <label for="">
                                            <input type="checkbox" name="search-category" value="men">
                                            رجالي
                                        </label>
                                    </div>
                                </li>
                                <li>
                                    <div class="checkbox ms-2">
                                        <label for="">
                                            <input type="checkbox" name="search-category" value="women">
                                            نسائي
                                        </label>
                                    </div>
                                </li>
                                <li>
                                    <div class="checkbox ms-2">
                                        <label for="">
                                            <input type="checkbox" name="search-category" value="kids">
                                            أطفال
                                        </label>
                                    </div>
                                </li>
                            </ul>
                        </div>
                        <button type="submit" class="btn search-btn">إبحث</button>
                    </form>
                    <div class="collapse navbar-collapse d-block my-collapse" id="navbarSupportedContent">
                        <ul class="my-navbar-nav navbar-nav me-auto mb-2 mb-lg-0 list-group flex-row">
                            <li class="nav-item active">
                                <a class="my-nav-link nav-link active" aria-current="page" href="#">الصفحة الرئيسية</a>
                            </li>
                            <li class="nav-item dropdown my-nav-link">
                                <a class="nav-link dropdown-toggle p-0" href="#" id="navbarDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                                    أقسام المتجر
                                </a>
                                <ul class="custom-dropdown-menu dropdown-menu position-absolute" aria-labelledby="navbarDropdown">
                                    <li><a class="dropdown-item" href="#">رجالي</a></li>
                                    <li><a class="dropdown-item" href="#">نسائي</a></li>
                                    <li><a class="dropdown-item" href="#">أطفال</a></li>
                                </ul>
                            </li>
                            <li class="nav-item">
                                <a class="my-nav-link nav-link" href="#">البحث المتقدم</a>
                            </li>
                            <li class="nav-item">
                                <a class="my-nav-link nav-link" href="#">تواصل معنا</a>
                            </li>
                            <li class="nav-item">
                                <a class="btn-icon btn" id="btn-shopping-card"
                                href="./checkout.html" title="عربة الشراء"
                                data-bs-toggle="tooltip" data-bs-placement="bottom">
                                    <i class="fa-solid fa-cart-shopping"></i>
                                </a>
                            </li>
                        </ul>
                    </div>
                </div>
            </nav>
        </div>
    </div>

</body>
</html>
